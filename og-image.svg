<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="549" cy="352" r="93" fill="#e91e63" opacity="0.10"/>
    <circle cx="292" cy="-90" r="24" fill="#e91e63" opacity="0.11"/>
    <circle cx="1134" cy="682" r="36" fill="#e91e63" opacity="0.14"/>
    <circle cx="817" cy="427" r="38" fill="#e91e63" opacity="0.14"/>
    <circle cx="952" cy="337" r="88" fill="#e91e63" opacity="0.15"/>
    <circle cx="1196" cy="116" r="66" fill="#e91e63" opacity="0.17"/>
    <rect x="134" y="129" width="55" height="50" rx="8" fill="#c2185b" opacity="0.08" transform="rotate(9, 1122, 83)"/>
    <rect x="10" y="566" width="49" height="29" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(8, 1008, 458)"/>
    <rect x="14" y="278" width="60" height="89" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(8, 548, 389)"/>
    <rect x="932" y="292" width="28" height="56" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(5, 1143, 694)"/>
    <rect x="580" y="590" width="29" height="36" rx="8" fill="#c2185b" opacity="0.15" transform="rotate(37, 616, -3)"/>
    <rect x="934" y="55" width="60" height="84" rx="8" fill="#c2185b" opacity="0.08" transform="rotate(33, 754, 325)"/>
    <rect x="1240" y="-30" width="60" height="78" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(25, 577, 90)"/>
    <rect x="1171" y="718" width="80" height="97" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(4, 832, 447)"/>
    <polygon points="1252,21 1293,103 1211,103" fill="#e91e63" opacity="0.07"/>
    <polygon points="617,234 685,370 549,370" fill="#e91e63" opacity="0.06"/>
    <polygon points="1257,411 1278,453 1236,453" fill="#e91e63" opacity="0.10"/>
    <polygon points="1030,13 1097,147 963,147" fill="#e91e63" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,584 C360,607 840,561 1200,584 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    홍대 클럽 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    홍대 — 클럽
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    홍대 홍대 클럽 추천정보 — 클럽
  </text>
</svg>